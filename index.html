<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu🌻💛</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,
#19398f 0%,
#07132f 40%,
#01040c 100%);
}

/* STARS */

#stars{
position:fixed;
inset:0;
overflow:hidden;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

/* FLOAT HEARTS */

.bgHeart{
position:absolute;
color:rgba(255,255,255,.08);
animation:floatHeart linear infinite;
pointer-events:none;
}

@keyframes floatHeart{

from{
transform:translateY(110vh);
}

to{
transform:translateY(-150px);
}

}

/* CARD */

.card{

width:360px;

padding:30px;

text-align:center;

border-radius:30px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 30px rgba(255,0,120,.15),
0 0 80px rgba(255,0,120,.08);

}

.title{
color:white;
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
color:rgba(255,255,255,.75);
font-size:14px;
margin-bottom:20px;
}

/* LOVE BUTTON */

#loveBtn{

border:none;
background:none;

font-size:120px;

cursor:pointer;

transition:.3s;

filter:
drop-shadow(0 0 15px #ff2d75)
drop-shadow(0 0 35px #ff2d75)
drop-shadow(0 0 70px #ff2d75);

}

#loveBtn:hover{
transform:scale(1.08);
}

.pulse{
animation:pulse .4s;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.3);
}

100%{
transform:scale(1);
}

}

/* SUNFLOWER */

#sunflowerContainer{
margin-top:20px;
display:flex;
justify-content:center;
}

.sunflower{

font-size:90px;

filter:
drop-shadow(0 0 15px rgba(255,255,0,.5))
drop-shadow(0 0 40px rgba(255,180,0,.5));

animation:sway 3s ease-in-out infinite;

}

@keyframes sway{

0%{
transform:rotate(-5deg);
}

50%{
transform:rotate(5deg);
}

100%{
transform:rotate(-5deg);
}

}

.musicBeat{

animation:
beat 1s infinite,
sway 3s ease-in-out infinite;

}

@keyframes beat{

0%{
transform:scale(1);
}

50%{
transform:scale(1.15);
}

100%{
transform:scale(1);
}

}

/* MESSAGE */

.message{

position:absolute;

left:50%;
top:55%;

transform:translateX(-50%);

padding:15px 25px;

background:rgba(255,0,120,.2);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:20px;

color:white;

font-weight:600;

animation:rise 5s linear forwards;

}

@keyframes rise{

0%{
opacity:0;
transform:
translateX(-50%)
translateY(0)
scale(.7);
}

15%{
opacity:1;
}

100%{
opacity:0;
transform:
translateX(-50%)
translateY(-450px)
scale(1.2);
}

}

/* PARTICLES */

.particle{
position:absolute;
pointer-events:none;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{

to{

opacity:0;

transform:
translate(var(--x),var(--y))
rotate(720deg)
scale(.2);

}

}

/* FOOTER */

.footer{

position:absolute;
bottom:20px;

font-size:12px;

color:rgba(255,255,255,.5);

}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

<div class="title">
Untuk Fiaaa 🌻💛
</div>

<div class="subtitle">
Tap-Tap hatinya ya 🥹😊😍
</div>

<button id="loveBtn">
❤️
</button>

<div id="sunflowerContainer">
<div class="sunflower">🌻</div>
</div>

</div>

<div class="footer">
Made with Aji Kun ✨
</div>

<audio id="music">
<source src="About You.mp3" type="audio/mpeg">
</audio>

<script>

/* STARS */

const stars=document.getElementById("stars");

for(let i=0;i<200;i++){

const star=document.createElement("div");

star.className="star";

const size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDuration=
(2+Math.random()*5)+"s";

stars.appendChild(star);

}

/* FLOATING HEARTS */

for(let i=0;i<30;i++){

const heart=document.createElement("div");

heart.className="bgHeart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=
(15+Math.random()*40)+"px";

heart.style.animationDuration=
(10+Math.random()*20)+"s";

document.body.appendChild(heart);

}

/* MUSIC */

const btn=document.getElementById("loveBtn");
const music=document.getElementById("music");
const flower=document.querySelector(".sunflower");

let musicStarted=false;

const messages=[

"You are my favorite person ❤️",
"My heart belongs to you 💕",
"You make my world brighter 🌎",
"Forever starts with you 💖",
"You are my sunshine 🌻",
"You make life beautiful 🌸",
"you're my peace 💛",
"forever, in my heart 💖",
"I choose you every day ❤️",
"Sayang Fiaaa 🌻💛",
"Hanya Fiaaa 🌻💛🫰",
"You complete my universe 🌙",
"Love grows every day 🌹"



];

btn.addEventListener("click",()=>{

if(!musicStarted){

music.play();

flower.classList.add("musicBeat");

musicStarted=true;

}

btn.classList.add("pulse");

setTimeout(()=>{
btn.classList.remove("pulse");
},400);

createMessage();
createParticles();

});

/* MESSAGE */

function createMessage(){

const msg=document.createElement("div");

msg.className="message";

msg.innerText=
messages[
Math.floor(
Math.random()*messages.length
)
];

document.body.appendChild(msg);

setTimeout(()=>{
msg.remove();
},5000);

}

/* PARTICLES */

function createParticles(){

const centerX=window.innerWidth/2;
const centerY=window.innerHeight/2;

for(let i=0;i<40;i++){

const p=document.createElement("div");

p.className="particle";

p.innerHTML=
Math.random()>0.5 ? "❤️" : "✨";

p.style.left=centerX+"px";
p.style.top=centerY+"px";

p.style.fontSize=
(15+Math.random()*25)+"px";

p.style.setProperty(
"--x",
((Math.random()-0.5)*600)+"px"
);

p.style.setProperty(
"--y",
((Math.random()-0.5)*600)+"px"
);

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},1200);

}

}

</script>

</body>
</html>
